<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Offline | Finance Close Calendar</title>
    <style>
      body {
        margin: 0;
        font-family: "Avenir Next", "Segoe UI", sans-serif;
        background:
          radial-gradient(circle at top left, rgba(13, 122, 111, 0.2), transparent 38%),
          linear-gradient(160deg, #f4efe6 0%, #efe5d5 100%);
        color: #20302b;
        display: grid;
        place-items: center;
        min-height: 100vh;
      }

      .panel {
        max-width: 480px;
        padding: 2rem;
        border-radius: 24px;
        background: rgba(255, 253, 248, 0.9);
        box-shadow: 0 24px 72px rgba(41, 56, 54, 0.16);
        border: 1px solid rgba(32, 48, 43, 0.08);
      }

      h1 {
        margin: 0 0 0.75rem;
        font-size: 1.75rem;
      }

      p {
        margin: 0;
        line-height: 1.6;
        color: #556862;
      }
    </style>
  </head>
  <body>
    <div class="panel">
      <h1>Offline, but ready to continue</h1>
      <p>
        Finance Close Calendar keeps the last loaded workspace locally. Reconnect once to refresh data and assets if this is your first visit on this device.
      </p>
    </div>
  </body>
</html>
